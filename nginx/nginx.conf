# ─────────────────────────────────────────────────────────────
# Nginx Configuration for CloudBlog
# ─────────────────────────────────────────────────────────────
#
# Nginx sits in front of our Django app and handles:
#   1. Serving static files (CSS, images) directly - much faster
#   2. Forwarding all other requests to Django (Gunicorn)
#   3. SSL termination (HTTPS)
#   4. HTTP → HTTPS redirect
#
# Without Nginx:         Browser → Django (handles everything)
# With Nginx:            Browser → Nginx → Django (handles business logic only)
#                               → Nginx serves /static/ directly
# ─────────────────────────────────────────────────────────────

# ── Upstream block ─────────────────────────────────────────
# Defines the Django/Gunicorn backend as a named group.
upstream django {
    server web:8000;
}

# ── HTTP → HTTPS Redirect ──────────────────────────────────
# Redirects all plain HTTP traffic to HTTPS automatically.
server {
    listen 80;
    server_name taskflow00014216.mooo.com;
    return 301 https://$host$request_uri;
}

# ── HTTP fallback (IP access) ──────────────────────────────
# Allows direct IP access without SSL for health checks.
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 20M;

    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# ── HTTPS Server (port 443) ────────────────────────────────
server {
    listen 443 ssl;
    server_name taskflow00014216.mooo.com;

    # SSL certificate files created by Let's Encrypt / Certbot
    ssl_certificate /etc/letsencrypt/live/taskflow00014216.mooo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taskflow00014216.mooo.com/privkey.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    client_max_body_size 20M;

    # ── Static Files ────────────────────────────────────────
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 7d;
    }

    # ── Proxy to Django ──────────────────────────────────────
    location / {
        proxy_pass http://django;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
