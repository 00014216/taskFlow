# ─────────────────────────────────────────────────────────────
# Nginx Configuration for CloudBlog
# ─────────────────────────────────────────────────────────────
#
# Nginx sits in front of our Django app and handles:
#   1. Serving static files (CSS, images) directly - much faster
#   2. Forwarding all other requests to Django (Gunicorn)
#   3. SSL termination (HTTPS)
#   4. HTTP → HTTPS redirect
#
# Without Nginx:         Browser → Django (handles everything)
# With Nginx:            Browser → Nginx → Django (handles business logic only)
#                               → Nginx serves /static/ directly
# ─────────────────────────────────────────────────────────────

# ── Upstream block ─────────────────────────────────────────
# Defines the Django/Gunicorn backend as a named group.
# Using 'upstream' instead of a bare URL lets Nginx do load-balancing
# and gives a cleaner config that is easy to extend later.
upstream django {
    server web:8000;
}

# ── HTTP Server (port 80) ──────────────────────────────────
server {
    listen 80;
    server_name _;  # Accept any hostname (update with your domain)

    # Maximum file upload size
    client_max_body_size 20M;

    # ── Static Files ────────────────────────────────────────
    # Nginx serves these directly without touching Django
    # This is much faster and frees up Django to handle real requests
    location /static/ {
        alias /usr/share/nginx/html/static/;
        # Tell browsers to cache static files for 30 days
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 7d;
    }

    # ── Proxy to Django ──────────────────────────────────────
    # All other requests are forwarded to Gunicorn (Django)
    location / {
        proxy_pass http://django;
        # Forward the real client IP (so Django logs show actual IPs)
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

