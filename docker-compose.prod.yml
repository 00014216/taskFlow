# ─────────────────────────────────────────────────────────────
# docker-compose.prod.yml — PRODUCTION ENVIRONMENT
# ─────────────────────────────────────────────────────────────
#
# This is for the LIVE SERVER (Azure VM).
# Key differences from development:
#   1. Pulls a pre-built image from Docker Hub (not building from code)
#   2. Uses Gunicorn instead of Django's dev server
#   3. Adds Nginx as a reverse proxy and static file server
#   4. No volume mounts for source code (runs the baked-in code)
#   5. restart: always - containers auto-restart if they crash
#
# Usage on the server:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────

version: '3.8'

services:

  # ── PostgreSQL Database ────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: cloudblog_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudblog_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cloudblog_redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django Application (Gunicorn) ──────────────────────────
  web:
    # This image is built by GitHub Actions and pushed to Docker Hub
    # GitHub Actions replaces YOUR_DOCKERHUB_USERNAME automatically via secrets
    image: ${DOCKERHUB_USERNAME}/cloudblog:latest
    container_name: cloudblog_web
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application
             --bind 0.0.0.0:8000
             --workers 3
             --timeout 120
             --access-logfile -"
    volumes:
      # Share static files with Nginx
      - static_files:/app/staticfiles
      - media_files:/app/media
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    expose:
      # Only expose to internal Docker network (not directly to internet)
      - "8000"

  # ── Nginx Web Server ───────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cloudblog_nginx
    ports:
      # 80: HTTP, 443: HTTPS
      - "80:80"
      - "443:443"
    volumes:
      # Nginx configuration file
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Static files served directly by Nginx (faster than Django)
      - static_files:/usr/share/nginx/html/static:ro
      - media_files:/usr/share/nginx/html/media:ro
      # SSL certificates (created by Certbot)
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
    restart: always

# ── Named Volumes ───────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_files:
    driver: local
  media_files:
    driver: local
