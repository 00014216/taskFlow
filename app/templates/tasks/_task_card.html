<!-- Reusable task card snippet (included in project_detail.html) -->
<div class="card task-row shadow-sm mb-2" draggable="true" data-task-id="{{ task.pk }}">
    <div class="card-body py-2 px-3">
        <div class="d-flex justify-content-between align-items-start">
            <a href="{% url 'task_detail' task.pk %}" class="text-decoration-none text-dark fw-semibold small">
                {{ task.title }}
            </a>
            <div class="d-flex gap-1 ms-2">
                <a href="{% url 'task_edit' task.pk %}" class="btn btn-xs btn-outline-secondary py-0 px-1" style="font-size:0.7rem;">
                    <i class="bi bi-pencil"></i>
                </a>
                <a href="{% url 'task_delete' task.pk %}" class="btn btn-xs btn-outline-danger py-0 px-1" style="font-size:0.7rem;">
                    <i class="bi bi-trash"></i>
                </a>
            </div>
        </div>
        <!-- Labels (M2M) -->
        {% if task.labels.all %}
        <div class="d-flex flex-wrap gap-1 mt-1">
            {% for label in task.labels.all %}
            <span class="badge" style="background-color:{{ label.color }}; font-size:0.65rem;">
                {{ label.name }}
            </span>
            {% endfor %}
        </div>
        {% endif %}
        <div class="d-flex gap-2 mt-1">
            <span class="badge bg-{{ task.priority_badge_color }} bg-opacity-10 text-{{ task.priority_badge_color }} border border-{{ task.priority_badge_color }} border-opacity-25"
                  style="font-size:0.65rem;">
                {{ task.get_priority_display }}
            </span>
            {% if task.due_date %}
            <small class="text-muted" style="font-size:0.7rem;"><i class="bi bi-calendar3 me-1"></i>{{ task.due_date|date:"d M" }}</small>
            {% endif %}
        </div>
    </div>
</div>
